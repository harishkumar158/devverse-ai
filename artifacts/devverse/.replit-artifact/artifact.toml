kind = "web"
previewPath = "/"
title = "DevVerse"
version = "1.0.0"
id = "artifacts/devverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23045

[services.development]
run = "pnpm --filter @workspace/devverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devverse", "run", "build" ]
publicDir = "artifacts/devverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23045"
BASE_PATH = "/"
